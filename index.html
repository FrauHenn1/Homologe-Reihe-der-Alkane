<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Alkane Übung</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 50%; }
    td, th { border: 1px solid #333; padding: 10px; text-align: center; }
    input { width: 100%; padding: 5px; }
    button { margin-top: 10px; padding: 10px; }
  </style>
</head>
<body>

<h2>Alkane: Molekülformeln ergänzen</h2>

<table>
  <tr>
    <th>Name</th>
    <th>Molekülformel</th>
  </tr>
  <tr>
    <td>Methan</td>
    <td><input type="text"></td>
  </tr>
  <tr>
    <td>Ethan</td>
    <td><input type="text"></td>
  </tr>
  <tr>
    <td>Propan</td>
    <td><input type="text"></td>
  </tr>
  <tr>
    <td>Butan</td>
    <td><input type="text"></td>
  </tr>
  <tr>
    <td>Pentan</td>
    <td><input type="text"></td>
  </tr>
</table>

<br>

<button onclick="subscript()">Ziffer tiefstellen</button>

<script>
function subscript() {
  let inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    let text = input.value;
    text = text.replace(/(\d)/g, function(match) {
      const subscripts = {
        '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄',
        '5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'
      };
      return subscripts[match];
    });
    input.value = text;
  });
}
</script>

</body>
</html>
