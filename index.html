<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Alkane ├Ьbung</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 520px;
      text-align: center;
    }

    h2 { color: #d35400; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 15px;
    }

    th {
      background-color: #e67e22;
      color: white;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 10px;
    }

    tr:nth-child(even) {
      background-color: #f9e4d4;
    }

    input {
      width: 90%;
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }

    .subBtn { background-color: #3498db; color: white; }
    .checkBtn { background-color: #2ecc71; color: white; }

    .correct { background-color: #c8f7c5 !important; }
    .wrong { background-color: #f7c5c5 !important; }
  </style>
</head>
<body>

<div class="container">

<h2>ЁЯзк Alkane ├Ьbung</h2>
<p><strong>Aufgabe:</strong> Erg├дnze die Molek├╝lformeln in der Tabelle.</p>

<table>
  <tr>
    <th>Name</th>
    <th>Molek├╝lformel</th>
  </tr>
  <tr>
    <td>Methan</td>
    <td><input type="text" data-solution="CH4"></td>
  </tr>
  <tr>
    <td>Ethan</td>
    <td><input type="text" data-solution="C2H6"></td>
  </tr>
  <tr>
    <td>Propan</td>
    <td><input type="text" data-solution="C3H8"></td>
  </tr>
  <tr>
    <td>Butan</td>
    <td><input type="text" data-solution="C4H10"></td>
  </tr>
  <tr>
    <td>Pentan</td>
    <td><input type="text" data-solution="C5H12"></td>
  </tr>
</table>

<button class="subBtn" onclick="subscript()">Ziffer tiefstellen</button>
<button class="checkBtn" onclick="checkAnswers()">├Ьberpr├╝fen</button>

</div>

<script>
function subscript() {
  let inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    let text = input.value;
    const subscripts = {
      '0':'тВА','1':'тВБ','2':'тВВ','3':'тВГ','4':'тВД',
      '5':'тВЕ','6':'тВЖ','7':'тВЗ','8':'тВИ','9':'тВЙ'
    };

    text = text.replace(/[0-9]/g, match => subscripts[match]);
    input.value = text;
  });
}

function normalize(text) {
  return text
    .replace(/[тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ]/g, d => '0123456789'['тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ'.indexOf(d)])
    .toUpperCase()
    .replace(/\s/g, '');
}

function hasSubscripts(text) {
  return /[тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ]/.test(text);
}

function checkAnswers() {
  let inputs = document.querySelectorAll('input');

  inputs.forEach(input => {
    let original = input.value;

    // tiefgestellte Zahlen zur├╝ckwandeln f├╝r Vergleich
    let user = original
      .replace(/[тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ]/g, d => '0123456789'['тВАтВБтВВтВГтВДтВЕтВЖтВЗтВИтВЙ'.indexOf(d)])
      .toUpperCase()
      .replace(/\s/g, '');

    let solution = input.dataset.solution;

    input.classList.remove('correct', 'wrong');

    // тЭЧ NEU: Tiefstellung Pflicht
    if (!hasSubscripts(original)) {
      input.classList.add('wrong');
      input.title = "Bitte verwende tiefgestellte Zahlen (z. B. CHтВД)!";
      return;
    }

    if (user === solution) {
      input.classList.add('correct');
      input.title = "Richtig!";
    } else {
      input.classList.add('wrong');

      // ЁЯСЗ Differenziertes Feedback
      if (!user.startsWith('C')) {
        input.title = "Die Formel muss mit C beginnen.";
      } else if (!user.includes('H')) {
        input.title = "Wasserstoff (H) fehlt.";
      } else {
        input.title = "├Ьberpr├╝fe die Anzahl der Atome.";
      }
    }
  });
}
</script>

</body>
</html>
