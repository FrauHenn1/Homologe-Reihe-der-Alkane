<html lang="de">
<head>
  <meta charset="UTF-8">

    body {

    }

    .container {
      background: white;

    input {
      width: 90%;
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }

    .subBtn { background-color: #3498db; color: white; }
    .checkBtn { background-color: #2ecc71; color: white; }

    .correct { background-color: #c8f7c5 !important; }

</head>

  </tr>
  <tr>
    <td>Pentan</td>
    <td><input type="text" data-solution="C5H12"></td>
  </tr>
  <tr>
    <td><strong>Allgemeine Summenformel</strong></td>
    <td><input type="text" data-solution="CNH2N+2"></td>
  </tr>
</table>


<button class="checkBtn" onclick="checkAnswers()">Überprüfen</button>

</div>

<script>
function subscript() {
  let inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    let text = input.value;
    const subscripts = {
      '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄',
      '5':'₅','6':'₆','7':'₇','8':'₈','9':'₉',
      'n':'ₙ','N':'ₙ','+':'₊'
    };

    text = text.replace(/[0-9nN\+]/g, function(match) {
      return subscripts[match] || match;
    });

    input.value = text;

function normalize(text) {
  return text
    .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, d => '0123456789'['₀₁₂₃₄₅₆₇₈₉'.indexOf(d)])
    .toUpperCase()
    .replace(/\s/g, '');
}

function checkAnswers() {
  let inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    let user = normalize(input.value);
    let solution = input.dataset.solution;

    input.classList.remove('correct', 'wrong');

    if (user === solution) {
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
    }
  });
}
// Automatische Tiefstellung beim Tippen
function autoSubscript(event) {
  const subscripts = {
    '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄',
    '5':'₅','6':'₆','7':'₇','8':'₈','9':'₉',
    'n':'ₙ','N':'ₙ','+':'₊'
  };

  let input = event.target;
  let cursorPos = input.selectionStart;
  let text = input.value;

  // Nur normale Zeichen umwandeln (keine bereits tiefgestellten)
  text = text.replace(/[0-9nN\+]/g, (match) => subscripts[match] || match);

  input.value = text;

  // Cursor wieder korrekt setzen
  input.setSelectionRange(cursorPos, cursorPos);
};

// Event-Listener für alle Eingabefelder
window.onload = function() {
  let inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    input.addEventListener('input', autoSubscript);
  });
};

</script>

</body>
</html>
