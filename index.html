<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Alkane Übung</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 520px;
      text-align: center;
    }

    h2 { color: #d35400; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 15px;
    }

    th {
      background-color: #e67e22;
      color: white;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 10px;
    }

    tr:nth-child(even) {
      background-color: #f9e4d4;
    }

    input {
      width: 90%;
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }

    .subBtn { background-color: #3498db; color: white; }
    .checkBtn { background-color: #2ecc71; color: white; }

    .correct { background-color: #c8f7c5 !important; }
    .wrong { background-color: #f7c5c5 !important; }

    .feedback {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      min-height: 30px;
    }
  </style>
</head>
<body>

<div class="container">

<h2>🧪 Alkane Übung</h2>
<p><strong>Aufgabe:</strong> Ergänze die Molekülformeln in der Tabelle.</p>

<table>
  <tr>
    <th>Name</th>
    <th>Molekülformel</th>
  </tr>
  <tr>
    <td>Methan</td>
    <td><input type="text" data-solution="CH4"></td>
  </tr>
  <tr>
    <td>Ethan</td>
    <td><input type="text" data-solution="C2H6"></td>
  </tr>
  <tr>
    <td>Propan</td>
    <td><input type="text" data-solution="C3H8"></td>
  </tr>
  <tr>
    <td>Butan</td>
    <td><input type="text" data-solution="C4H10"></td>
  </tr>
  <tr>
    <td>Pentan</td>
    <td><input type="text" data-solution="C5H12"></td>
  </tr>
</table>

<button class="subBtn" onclick="subscript()">Ziffer tiefstellen</button>
<button class="checkBtn" onclick="checkAnswers()">Überprüfen</button>

<div id="feedback" class="feedback"></div>

</div>

<script>
function subscript() {
  let inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    let text = input.value;
    const subscripts = {
      '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄',
      '5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'
    };

    text = text.replace(/[0-9]/g, match => subscripts[match]);
    input.value = text;
  });
}

function hasSubscripts(text) {
  return /[₀₁₂₃₄₅₆₇₈₉]/.test(text);
}

function normalize(text) {
  return text
    .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, d => '0123456789'['₀₁₂₃₄₅₆₇₈₉'.indexOf(d)])
    .toUpperCase()
    .replace(/\s/g, '');
}

function checkAnswers() {
  let inputs = document.querySelectorAll('input');
  let correctCount = 0;
  let feedbackText = "";

  inputs.forEach(input => {
    let original = input.value;
    let user = normalize(original);
    let solution = input.dataset.solution;

    input.classList.remove('correct', 'wrong');

    if (!hasSubscripts(original)) {
      input.classList.add('wrong');
      feedbackText = "⚠️ Achte darauf, tiefgestellte Zahlen zu verwenden!";
      return;
    }

    if (user === solution) {
      input.classList.add('correct');
      correctCount++;
    } else {
      input.classList.add('wrong');
      feedbackText = "❌ Überprüfe deine Formeln (C und H sowie Anzahl der Atome)!";
    }
  });

  let feedback = document.getElementById("feedback");

  if (correctCount === inputs.length) {
    feedback.innerHTML = "🎉 Sehr gut! Alle Formeln sind richtig!";
    feedback.style.backgroundColor = "#c8f7c5";
  } else if (correctCount > 0) {
    feedback.innerHTML = `👍 ${correctCount} von ${inputs.length} richtig. ${feedbackText}`;
    feedback.style.backgroundColor = "#fff3cd";
  } else {
    feedback.innerHTML = "❌ Noch nichts richtig. Versuche es erneut!";
    feedback.style.backgroundColor = "#f7c5c5";
  }
}
</script>

</body>
</html>
